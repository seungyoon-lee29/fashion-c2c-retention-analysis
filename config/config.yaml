# Growth activation → retention survival + g-computation impact.
# Every assumption lives here so the analysis is reproducible and sensitivity-testable.

seed: 17

data:
  source: merrec             # synthetic | merrec  (synthetic = offline ground-truth backstop for tests)
  local_dir: ""              # if set, read *.parquet from here (your local MerRec) — no download
  merrec_date: "20230501"
  merrec_n_files: 5          # ~350MB, ~35k users when source=merrec
  synthetic_n_users: 4000
  cache_dir: data/raw
  # MerRec stores the event-type string in `event_id` (NOT `name`, which is the product title).
  event_col_candidates: [event_id, event, event_type, action]
  columns: [user_id, stime, session_id, item_id, c0_name, c1_name, brand_name, price, event]

# Time axis (the root of leakage + truncation control). Units = days.
windows:
  truncation_buffer_days: 1  # require t0 >= data_start + buffer (left-truncation mitigation)
  feature_window_W: 3        # X measured in [t0, t0+W)
  embargo_gap_G: 2           # blackout [t0+W, t0+W+G) ; also swept in drivers
  gap_sweep: [0, 1, 2, 3, 5, 7]
  aha_windows_n: [1, 3]      # n <= W
  horizon_H: 14              # outcome/observation window length (days) after gap

# Person-period (discrete-time survival) clock. Decided/confirmed in Phase 0.
person_period:
  step_days: 1               # 1 | 2 | 3 ; widen if daily rows too sparse
  lapse_inactive_days: 7     # churn = N consecutive inactive days (absorbing)

# Spine outcome = RETENTION: a user returns for activity in the outcome window (first purchase
# in MerRec is immediate → acquisition, not retention). Churn (lapse) = `lapse_inactive_days`
# of no activity. `conversion: buy_comp` is kept only for the Phase-0 funnel feasibility gate.
events:
  conversion: buy_comp
  near_purchase: [buy_start, offer_make]   # flagged, NOT deleted (kept if pre-embargo)
  all_types: [item_view, item_like, item_add_to_cart_tap, offer_make, buy_start, buy_comp]

aha_grid:
  k_values: [1, 2, 3, 5]

hazard:
  model: gbm                 # logistic | gbm
  calibrate: true

impact:
  n_sims: 1000               # Monte Carlo over Dirichlet posteriors
  dirichlet_prior: 0.5       # Jeffreys-ish weakly-informative
  lever_ledger:              # do(X): which transition/behavior moved, by how much (pp)
    conservative: 0.5        # multiplier on anchored lever
    base: 1.0
    optimistic: 1.5
  overlap_extreme_frac_max: 0.10   # M2: lever fails OVERLAP if >10% of units have e outside e_bounds
  overlap_e_bounds: [0.05, 0.95]   # M2: propensity outside this band = non-overlap tail
  lever_thresholds:                # M2 identifiability-map treatment defs: (feature ≥ value) ⇒ treated
    n_cart: 1
    n_offer: 1
    cat_diversity: 3
    n_like: 3
  iptw:
    clip_quantile: 0.99      # stabilise extreme weights; check positivity
  disagreement_threshold_pct: 30   # pre-registered: legs diverging > this => diagnose, not average
  negligible_effect_pp: 0.03       # |Δ| below this (both estimators) => effect is null; rel-divergence then uninformative, ledger omitted

# M1 DA reports (funnel + cohort) — analysis params as single source (no magic numbers in code).
da_reports:
  retention_days: [1, 3, 7]        # cohort revisit horizons (D-k)
  category_min_users: 500          # funnel: drop categories below this (noise floor)
  breadth_quantiles: 4             # cohort driver: first-day-activity bins

# M3 A/B design — power/MDE single source. primary_mde_pp is a BUSINESS judgment (see ab_test_design.md),
# deliberately NOT reverse-derived from the available sample size.
ab_test:
  alpha: 0.05                      # two-sided significance
  power: 0.80
  mde_grid_pp: [1.0, 1.5, 2.0, 3.0, 5.0]   # absolute pp lifts to tabulate
  primary_mde_pp: 2.0              # headline MDE

figures:
  dir: docs/figures
  dpi: 110
